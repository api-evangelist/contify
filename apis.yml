      - REST
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.contify.com/news-api/
    properties:
      - url: https://www.contify.com/news-api/
        type: Documentation
      - url: https://developer.contify.com/
        type: DeveloperPortal
      - url: https://www.contify.com/news-api/
        type: SignUp
    description: >-
      The Contify News API is a developer-friendly REST/JSON API that
      aggregates, deduplicates, and enriches business news from over a million
      curated sources, covering 700,000+ companies and 117+ languages with
      auto-translation to English. It provides advanced entity tagging,
      sentiment analysis, AI-generated highlights, and 15+ queryable metadata
      fields, with delivery via API endpoints and webhook integration backed
      by a 99.9% uptime SLA. Common use cases include feeding competitive
      intelligence dashboards, tracking key accounts and industries, powering
      sales and marketing alerts, and providing news context to AI agents.

