name: Contify
description: >-
  Contify is an AI-powered market and competitive intelligence platform that
  helps businesses track competitor activity, market trends, and industry
  news. It exposes a REST News API that delivers structured, deduplicated,
  and enriched business news data on companies, industries, and topics.
